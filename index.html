<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- Primary Meta Tags -->
    <title>Brenden's Archive — Photography Portfolio</title>
    <meta name="description" content="A curated photography archive where moments are preserved as spells. Explore collections of nature, urban, and fine art photography through an immersive library experience." />
    <meta name="author" content="Brenden Cheng" />
    <meta name="theme-color" content="#0a0a0f" />
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Brenden's Archive" />
    <meta property="og:description" content="A curated photography archive where moments are preserved as spells." />
    <meta property="og:site_name" content="Brenden's Archive" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Brenden's Archive" />
    <meta name="twitter:description" content="A curated photography archive where moments are preserved as spells." />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='none' stroke='%234dd0e1' stroke-width='1.5'/><circle cx='16' cy='16' r='8' fill='none' stroke='%234dd0e1' stroke-width='0.8' stroke-dasharray='3 3'/><circle cx='16' cy='16' r='3' fill='%234dd0e1'/></svg>" />
    
    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <!-- GitHub Pages SPA redirect decoder (works with 404.html) -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
